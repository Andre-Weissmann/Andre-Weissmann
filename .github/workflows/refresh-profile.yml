name: Refresh profile stats

# Safety design (deliberate):
#   - Runs on a schedule + manual dispatch only. No trigger on external input
#     (no `issues:`, no `pull_request_target`, no user-controlled content
#     feeding into this workflow) — this is the exact class of trigger that
#     the Clinejection/RoguePilot incidents in the 2026 CSA research abused.
#   - Permissions are read-only by default at the job level; only the final
#     step that needs to open a PR gets contents/PRs write, scoped as
#     narrowly as GitHub Actions allows.
#   - The workflow NEVER pushes to `main`. It always creates a fresh branch
#     and opens a pull request. A human (Andre) must review and merge.
#   - No step ever executes content fetched from an untrusted source (no
#     issue bodies, no external URLs' content, no third-party README text)
#     as a shell command or script. Only this repo's own committed
#     scripts/*.py run.

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays, 08:00 America/Chicago (13:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch real stats (GitHub + DataGlow CI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_stats.py

      - name: Render README from stats
        run: python3 scripts/render_readme.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- README.md stats.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request for review
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refresh-profile-stats
          delete-branch: true
          title: "Weekly profile stats refresh"
          commit-message: "chore: refresh live profile stats"
          body: |
            Automated weekly refresh — generated by `scripts/fetch_stats.py` and `scripts/render_readme.py`.

            This PR was opened by a scheduled workflow. Nothing was committed directly to `main`.
            Please review the diff before merging: every number below should trace back to a live
            GitHub API response captured at run time.
          labels: automated
